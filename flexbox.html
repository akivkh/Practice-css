<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        .container{
            display: flex;
            /* flex container examples */
            /* flex-direction: column; */
            /* flex-direction: row-reverse; */
            /* flex-direction: column-reverse; */
            flex-direction: row;
            flex-wrap: wrap;
            /* flex-wrap: wrap-reverse; */
            /* justify-content: center; */
            justify-content:flex-start ;
            background-color: aquamarine;
            /* height: 70vh; */
            height: 100vh;
            align-items: center;
            /* align-content: center; */
        }
        .box1{
            height: 234px;
            /* width: 325px; */
            background-color:rgb(44, 14, 212);
            color: wheat;
            
            border:2px solid black;
            /* flex items order */
            order: 4;
            /* align self */
            /* align-self: flex-end; */
            /* flex grow */
            /* flex-grow: 1; */
            /* flex-grow: 2; */
            flex-grow: 3;

        }
        .box2{
            height: 234px;
            /* width: 325px; */
            background-color:rgb(14, 235, 161);
            border: 2px solid black;
            flex-grow: 1;

        }
    </style>
</head>
<body>
    <div class="container">
     <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
    <div class="box2">Box2a</div>
    <div class="box2">Box2b</div>
    </div>

</body>
</html>
