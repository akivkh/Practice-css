    <!-- question 3 practice set 7 
    3. create a webpage which is green in device,red in medium and yellow in small device
     -->
    <style>
        body {
            background-color: green;
        }

        @media screen and (max-width:800px) {
            body {
                background-color: red;
            }

        }

        @media screen and (max-width:600px) {
            body {
                background-color: yellow;
            }

        }
    </style>
</head>
