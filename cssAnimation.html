<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{
            height: 100vh;
            width: 100vw;
            background-color:blue;
        }

        .box{
            height: 300px;
            width: 300px;
            background-color: chocolate;
            color: wheat;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* animation-name: widthAnimate;
            animation-duration: 3s;
            animation-delay: 1s;
            animation-iteration-count: infinite;
            animation-direction: alternate-reverse;
            animation-timing-function: ease-in; */
            /* animation: widthAnimate 3s ease-in-out .25s 4 alternate; */
            /* animation: widthAnimate2 3s ease-in-out .25s 4 alternate; */
        }

        img{
            /* animation: widthAnimate 3s ease-in-out .25s infinite alternate; */
            animation: widthAnimate2 3s ease-in-out .25s 4 alternate;
        }
        @keyframes widthAnimate {
            from{
                width: 300px;
                height: 300px;
            }
            to{
                /* width: 100vw;
                height: 100vh; */
                /* for image */
                width: 10vw;
                height: 10vh;
            }
          
    }
    @keyframes widthAnimate2 {
        0%{
            width: 30px;
            height: 30px;
        }
        20%{
            width: 130px;
            height: 130px;

        }
        100%{
            width: 190px;
            height: 190px;
        }
        
    }
            
        
    </style>
</head>
<body>
    <div class="container">
        <!-- <div class="box"> -->
            <img src="dragon.png" alt="" width="344px">
        </div>
    </div>
</body>
</html>
