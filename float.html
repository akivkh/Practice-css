<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float</title>
    <style>
        .box1{
            height: 234px;
            width: 325px;
            background-color:black;
            color: wheat;
            /* float: right; */
            float: left;
        }
        .box2{
            height: 234px;
            width: 325px;
            background-color:rgb(14, 235, 161);
            float: right;
            clear: right;

        }
    </style>
</head>
<body>
    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
</body>
</html>
