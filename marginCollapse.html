<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Collapse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box1 {
            background-color: red;
            margin: 30px;
            height: 2320px;
            width: 233px;
            border: 2px solid black;

        }

        .box2 {
            background-color: aqua;
            /* margin: 30px; */
            height: 20px;
            width: 100%;
            padding: 2px;
            border: 1px solid grey;
            /* box-sizing: content-box; */
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="box1">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Vitae necessitatibus deleniti maxime
        inventore atque, sed repellendus veritatis magni maiores aperiam quibusdam enim ratione vero optio qui natus,
        error quo doloribus officiis ullam beatae culpa.</div>
    <div class="box2">

    </div>
</body>

</html>
