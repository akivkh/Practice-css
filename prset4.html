<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <title>Practice set 4</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .navbar {
        height: 70px;
        background-color: black;
        color: wheat;
    }

    .navbar ul li a {
        color: wheat;
        text-decoration: none;
    }

    .navbar ul li {
        display: inline-block;
        margin: 23px 14px;
        font-size: 20px;
    }

    .right {
        /* height: 50vh; */
        background-color: green;
        display: inline-block;
        height: 90vh;
        width: 50%;

    }

    .left {
        /* height: 50vh; */
        background-color: red;
        display: inline-block;
        height: 90vh;
        width: 50%;
        /* 4. difference between display none and visiblity hidden  */
        /* display: none; */
        visibility: hidden;
    }

    footer {
        font-family: 'Baloo Bhai 2', cursive;
        background-color: black;
        color: white;
        padding: 6px;
        /*5. change the footer in uppercase */
        text-transform: uppercase;
    }

    .center {
        text-align: center;
    }
</style>
<!-- 1. create the following website flow -->

<body>
    <!-- 3. Remove underlines from links -->
    <div class="navbar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact us</a></li>
        </ul>

    </div>
    <div class="left">Lorem, ipsum dolor.
    </div>
    <div class="right">Lorem ipsum dolor sit amet.
    </div>

    <!-- 2. add footer with google font baloo bhai -->
    <footer>
        <p class="center"> copyright &copy; 2026 - All copyright reserved</p>
    </footer>
</body>

</html>
