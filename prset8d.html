<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Set</title>
    <style>
        header{
            background-color: black;
            height: 122px;
        }
        main{
            background-color: chartreuse;
            height: 850px;
        }
        @keyframes slide1 {
            0%{
                transform: translate(-8v);
            }
            100%{
                transform: translate(85vw);
            }
            
        }
        @keyframes slide2 {
            0%{
                transform: translate(0vw);
            }
            100%{
                transform: translate(92vw);
            }
            
        }
        /* @keyframes slide3 {
            0%{
                transform: translate(8vw);
            }
            100%{
                transform: 100vw;
            }
            
        } */
        img{
            display: flex;
            margin: auto;
        }
        .slider{
            background-color:white;
            height: 450px;
            /* width: 100vw; */
            overflow: hidden;
            margin: auto;
            display: flex;
            justify-content: center;

        }
        .img1{
            transform: translate(-8vw);
            animation: slide1 1s 2s forwards;
        }
        .img2{
            transform: translate(0vw);
            animation: slide2 1s 3s forwards;
        }
        .img3{
            transform: translate(20vw);
            /* animation: slide3 1s forwards ; */
        }
       

    </style>
</head>
<!-- create a slider with 3 image using css -->
<body>
    <header></header>
    <main>
        <div class="slider">
            <img class="img1" src="pic1.jpg">
            <img class="img2" src="pic2.jpg">
            <img class="img3" src="pic3.jpg">
        </div>
    </main>
</body>
</html>
